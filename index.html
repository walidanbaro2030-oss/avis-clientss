<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Client Avis</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    display: flex;
    justify-content: center;
    padding: 30px;
}

.container {
    background: white;
    width: 420px;
    padding: 20px;
    border-radius: 15px;
}

.stars span {
    font-size: 30px;
    cursor: pointer;
    color: gray;
}

.stars .active {
    color: gold;
}

textarea {
    width: 100%;
    height: 80px;
    margin-top: 10px;
}

button {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    background: #4f46e5;
    color: white;
    border: none;
    border-radius: 10px;
}

</style>
</head>

<body>

<div class="container">

<h2>⭐ Donnez votre avis</h2>

<div class="stars" id="stars">
    <span data-value="1">★</span>
    <span data-value="2">★</span>
    <span data-value="3">★</span>
    <span data-value="4">★</span>
    <span data-value="5">★</span>
</div>

<textarea id="comment" placeholder="Commentaire (optionnel)"></textarea>

<button onclick="sendSimple()">⭐ Envoyer étoiles فقط</button>
<button onclick="sendFull()">⭐ + Commentaire</button>

</div>

<script>
let rating = 0;
let data = JSON.parse(localStorage.getItem("data")) || [];

/* stars */
document.querySelectorAll("#stars span").forEach(star => {
    star.addEventListener("click", function () {
        rating = this.dataset.value;

        document.querySelectorAll("#stars span").forEach(s => s.classList.remove("active"));
        for (let i = 0; i < rating; i++) {
            document.querySelectorAll("#stars span")[i].classList.add("active");
        }
    });
});

/* cas 1: stars only */
function sendSimple() {
    if (rating == 0) return alert("Choisir étoiles");

    data.push({
        type: "star",
        rating: parseInt(rating),
        comment: ""
    });

    localStorage.setItem("data", JSON.stringify(data));

    alert("Merci ⭐");
    reset();
}

/* cas 2: stars + comment */
function sendFull() {
    let comment = document.getElementById("comment").value;

    if (rating == 0) return alert("Choisir étoiles");

    data.push({
        type: "full",
        rating: parseInt(rating),
        comment: comment
    });

    localStorage.setItem("data", JSON.stringify(data));

    alert("Merci ⭐ + commentaire");
    reset();
}

function reset() {
    rating = 0;
    document.getElementById("comment").value = "";
    document.querySelectorAll("#stars span").forEach(s => s.classList.remove("active"));
}
</script>

</body>
</html>
