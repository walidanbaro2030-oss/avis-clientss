<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Review System</title>

<style>
body {
    font-family: 'Segoe UI';
    background: #0f172a;
    margin: 0;
    display: flex;
    justify-content: center;
    padding: 30px;
    color: white;
}

/* container */
.container {
    background: white;
    color: black;
    width: 500px;
    padding: 20px;
    border-radius: 15px;
}

/* stars */
.stars span {
    font-size: 30px;
    cursor: pointer;
    color: #ccc;
}

.stars .active {
    color: gold;
}

/* inputs */
textarea {
    width: 100%;
    height: 80px;
    margin-top: 10px;
    padding: 10px;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    background: #4f46e5;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

/* review */
.review {
    background: #f1f5f9;
    padding: 10px;
    margin-top: 10px;
    border-radius: 10px;
}

/* admin */
.adminBox {
    display: none;
    margin-top: 20px;
    background: #111827;
    color: white;
    padding: 15px;
    border-radius: 10px;
}

.stats {
    display: flex;
    justify-content: space-between;
}

.card {
    background: #1f2937;
    padding: 10px;
    width: 30%;
    border-radius: 10px;
    text-align: center;
}
</style>
</head>

<body>

<div class="container">

    <h2>⭐ Avis Clients</h2>

    <!-- CLIENT AREA -->
    <div id="clientArea">

        <div class="stars" id="stars">
            <span data-value="1">★</span>
            <span data-value="2">★</span>
            <span data-value="3">★</span>
            <span data-value="4">★</span>
            <span data-value="5">★</span>
        </div>

        <textarea id="comment" placeholder="Votre avis..."></textarea>
        <button onclick="addReview()">Envoyer</button>

        <h3>Avis :</h3>
        <div id="reviews"></div>

    </div>

    <!-- ADMIN LOGIN -->
    <div id="login">
        <h3>🔐 Admin Login</h3>
        <input id="pass" type="password" placeholder="Mot de passe">
        <button onclick="login()">Entrer Admin</button>
    </div>

    <!-- ADMIN DASHBOARD -->
    <div class="adminBox" id="adminBox">
        <h3>👨‍💼 Admin Dashboard</h3>

        <div class="stats">
            <div class="card">
                <h3 id="count">0</h3>
                <p>Avis</p>
            </div>

            <div class="card">
                <h3 id="avg">0</h3>
                <p>Moyenne</p>
            </div>

            <div class="card">
                <h3 id="max">0</h3>
                <p>Max ⭐</p>
            </div>
        </div>
    </div>

</div>

<script>
let rating = 0;
let reviews = JSON.parse(localStorage.getItem("reviews")) || [];

/* ⭐ stars */
document.querySelectorAll("#stars span").forEach(star => {
    star.addEventListener("click", function () {
        rating = this.getAttribute("data-value");

        document.querySelectorAll("#stars span").forEach(s => s.classList.remove("active"));
        for (let i = 0; i < rating; i++) {
            document.querySelectorAll("#stars span")[i].classList.add("active");
        }
    });
});

/* add review */
function addReview() {
    let comment = document.getElementById("comment").value;

    if (rating == 0 || comment === "") {
        alert("Remplir tout !");
        return;
    }

    reviews.push({
        rating: parseInt(rating),
        comment: comment
    });

    localStorage.setItem("reviews", JSON.stringify(reviews));

    document.getElementById("comment").value = "";
    rating = 0;
    document.querySelectorAll("#stars span").forEach(s => s.classList.remove("active"));

    display();
}

/* display reviews + stats */
function display() {
    let box = document.getElementById("reviews");
    box.innerHTML = "";

    let total = 0;
    let max = 0;

    reviews.forEach(r => {
        let div = document.createElement("div");
        div.className = "review";
        div.innerHTML = "⭐".repeat(r.rating) + "<br>" + r.comment;
        box.appendChild(div);

        total += r.rating;
        if (r.rating > max) max = r.rating;
    });

    let avg = reviews.length ? (total / reviews.length).toFixed(1) : 0;

    document.getElementById("count").innerText = reviews.length;
    document.getElementById("avg").innerText = avg;
    document.getElementById("max").innerText = max;
}

/* login admin */
function login() {
    let pass = document.getElementById("pass").value;

    if (pass === "admin123") {
        document.getElementById("adminBox").style.display = "block";
        document.getElementById("login").style.display = "none";
    } else {
        alert("Mot de passe incorrect !");
    }
}

/* init */
window.onload = display;
</script>

</body>
</html>
