<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Avis Clients</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f9;
    text-align: center;
}

.container {
    background: white;
    width: 400px;
    margin: 50px auto;
    padding: 20px;
    border-radius: 10px;
}

h2 {
    margin-bottom: 10px;
}

.stars span {
    font-size: 30px;
    cursor: pointer;
    color: gray;
}

.stars .active {
    color: gold;
}

textarea {
    width: 100%;
    height: 80px;
    margin-top: 10px;
    padding: 5px;
}

button {
    margin-top: 10px;
    padding: 10px;
    background: #007BFF;
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 5px;
}

.review {
    background: #eee;
    margin-top: 10px;
    padding: 10px;
    border-radius: 5px;
}
</style>
</head>

<body>

<div class="container">
    <h2>⭐ Donnez votre avis</h2>

    <div class="stars" id="stars">
        <span data-value="1">★</span>
        <span data-value="2">★</span>
        <span data-value="3">★</span>
        <span data-value="4">★</span>
        <span data-value="5">★</span>
    </div>

    <textarea id="comment" placeholder="Votre commentaire..."></textarea>
    <br>
    <button onclick="addReview()">Envoyer</button>

    <h3>Avis des clients</h3>
    <div id="reviews"></div>

    <h3>Scanner le QR code</h3>
    <img id="qrcode" src="" alt="QR Code">
</div>

<script>
let rating = 0;

// Gestion des étoiles
document.querySelectorAll("#stars span").forEach(star => {
    star.addEventListener("click", function() {
        rating = this.getAttribute("data-value");
        document.querySelectorAll("#stars span").forEach(s => s.classList.remove("active"));
        for (let i = 0; i < rating; i++) {
            document.querySelectorAll("#stars span")[i].classList.add("active");
        }
    });
});

// Ajouter un avis
function addReview() {
    let comment = document.getElementById("comment").value;

    if (rating == 0 || comment === "") {
        alert("Veuillez remplir tous les champs !");
        return;
    }

    let review = document.createElement("div");
    review.className = "review";
    review.innerHTML = "⭐".repeat(rating) + "<br>" + comment;

    document.getElementById("reviews").appendChild(review);

    document.getElementById("comment").value = "";
    rating = 0;
    document.querySelectorAll("#stars span").forEach(s => s.classList.remove("active"));
}

// Générer QR code automatiquement
window.onload = function() {
    let url = window.location.href;
    document.getElementById("qrcode").src =
        "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" + url;
}
</script>

</body>
</html>
