<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Avis Clients</title>

<style>
body {
    font-family: 'Segoe UI';
    background: linear-gradient(135deg, #667eea, #764ba2);
    text-align: center;
    color: white;
}

.container {
    background: white;
    color: black;
    width: 420px;
    margin: 50px auto;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.stars span {
    font-size: 30px;
    cursor: pointer;
    color: gray;
}

.stars .active {
    color: gold;
}

textarea {
    width: 100%;
    height: 80px;
    margin-top: 10px;
    padding: 5px;
}

button {
    margin-top: 10px;
    padding: 10px;
    background: linear-gradient(45deg, #ff7e5f, #feb47b);
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

.review {
    background: #eee;
    margin-top: 10px;
    padding: 10px;
    border-radius: 5px;
}
</style>
</head>

<body>

<div class="container">
    <h2>⭐ Donnez votre avis</h2>

    <div class="stars" id="stars">
        <span data-value="1">★</span>
        <span data-value="2">★</span>
        <span data-value="3">★</span>
        <span data-value="4">★</span>
        <span data-value="5">★</span>
    </div>

    <textarea id="comment" placeholder="Votre commentaire..."></textarea>
    <br>
    <button onclick="addReview()">Envoyer</button>

    <h3>Moyenne : <span id="average">0</span> ⭐</h3>

    <h3>Avis des clients</h3>
    <div id="reviews"></div>

    <h3>Scanner QR code</h3>
    <img id="qrcode">
</div>

<script>
let rating = 0;
let reviews = JSON.parse(localStorage.getItem("reviews")) || [];

// étoiles
document.querySelectorAll("#stars span").forEach(star => {
    star.addEventListener("click", function() {
        rating = this.getAttribute("data-value");
        document.querySelectorAll("#stars span").forEach(s => s.classList.remove("active"));
        for (let i = 0; i < rating; i++) {
            document.querySelectorAll("#stars span")[i].classList.add("active");
        }
    });
});

// afficher avis
function displayReviews() {
    let container = document.getElementById("reviews");
    container.innerHTML = "";

    let total = 0;

    reviews.forEach(r => {
        let div = document.createElement("div");
        div.className = "review";
        div.innerHTML = "⭐".repeat(r.rating) + "<br>" + r.comment;
        container.appendChild(div);

        total += r.rating;
    });

    let avg = reviews.length ? (total / reviews.length).toFixed(1) : 0;
    document.getElementById("average").innerText = avg;
}

// ajouter avis
function addReview() {
    let comment = document.getElementById("comment").value;

    if (rating == 0 || comment === "") {
        alert("Remplissez tout !");
        return;
    }

    let review = {
        rating: parseInt(rating),
        comment: comment
    };

    reviews.push(review);
    localStorage.setItem("reviews", JSON.stringify(reviews));

    document.getElementById("comment").value = "";
    rating = 0;
    document.querySelectorAll("#stars span").forEach(s => s.classList.remove("active"));

    displayReviews();
}

// QR code auto
window.onload = function() {
    displayReviews();

    let url = window.location.href;
    document.getElementById("qrcode").src =
        "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" + url;
};
</script>

</body>
</html>
