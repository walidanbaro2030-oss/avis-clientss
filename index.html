<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Avis Clients</title>
<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    text-align: center;
}

.container {
    background: white;
    padding: 20px;
    margin: 50px auto;
    width: 400px;
    border-radius: 10px;
}

.stars span {
    font-size: 30px;
    cursor: pointer;
    color: gray;
}

.stars .active {
    color: gold;
}

textarea {
    width: 100%;
    height: 80px;
    margin-top: 10px;
}

button {
    margin-top: 10px;
    padding: 10px;
    background: blue;
    color: white;
    border: none;
    cursor: pointer;
}

.review {
    background: #eee;
    margin-top: 10px;
    padding: 10px;
    border-radius: 5px;
}
</style>
</head>

<body>

<div class="container">
    <h2>Donnez votre avis ⭐</h2>

    <div class="stars" id="stars">
        <span data-value="1">★</span>
        <span data-value="2">★</span>
        <span data-value="3">★</span>
        <span data-value="4">★</span>
        <span data-value="5">★</span>
    </div>

    <textarea id="comment" placeholder="Votre commentaire..."></textarea>
    <button onclick="submitReview()">Envoyer</button>

    <h3>Avis des clients</h3>
    <div id="reviews"></div>
</div>

<script>
let rating = 0;

document.querySelectorAll("#stars span").forEach(star => {
    star.addEventListener("click", function() {
        rating = this.getAttribute("data-value");
        document.querySelectorAll("#stars span").forEach(s => s.classList.remove("active"));
        for (let i = 0; i < rating; i++) {
            document.querySelectorAll("#stars span")[i].classList.add("active");
        }
    });
});

function submitReview() {
    let comment = document.getElementById("comment").value;

    if (rating == 0 || comment == "") {
        alert("Remplissez tout !");
        return;
    }

    let reviewDiv = document.createElement("div");
    reviewDiv.className = "review";
    reviewDiv.innerHTML = "⭐".repeat(rating) + "<br>" + comment;

    document.getElementById("reviews").appendChild(reviewDiv);

    document.getElementById("comment").value = "";
    rating = 0;
    document.querySelectorAll("#stars span").forEach(s => s.classList.remove("active"));
}
</script>

</body>
</html>
