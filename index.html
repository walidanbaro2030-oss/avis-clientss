<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Avis Clients</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #0f172a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
}

.container {
    background: #ffffff;
    width: 450px;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.3);
}

h2 {
    text-align: center;
    margin-bottom: 10px;
}

.stars span {
    font-size: 32px;
    cursor: pointer;
    color: #ccc;
    transition: 0.2s;
}

.stars span.active {
    color: #fbbf24;
}

textarea {
    width: 100%;
    height: 90px;
    margin-top: 10px;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ddd;
    resize: none;
}

button {
    width: 100%;
    margin-top: 10px;
    padding: 12px;
    background: #4f46e5;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
}

button:hover {
    background: #4338ca;
}

.review {
    background: #f1f5f9;
    margin-top: 10px;
    padding: 12px;
    border-radius: 10px;
    border-left: 5px solid #4f46e5;
}

.moyenne {
    text-align: center;
    margin-top: 10px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
    <h2>⭐ Avis Clients</h2>

    <div class="stars" id="stars">
        <span data-value="1">★</span>
        <span data-value="2">★</span>
        <span data-value="3">★</span>
        <span data-value="4">★</span>
        <span data-value="5">★</span>
    </div>

    <textarea id="comment" placeholder="Écrire votre avis..."></textarea>
    <button onclick="addReview()">Envoyer</button>

    <div class="moyenne">
        Moyenne : <span id="average">0</span> ⭐
    </div>

    <div id="reviews"></div>
</div>

<script>
let rating = 0;
let reviews = JSON.parse(localStorage.getItem("reviews")) || [];

// ⭐ stars
document.querySelectorAll("#stars span").forEach(star => {
    star.addEventListener("click", function () {
        rating = this.getAttribute("data-value");

        document.querySelectorAll("#stars span").forEach(s => s.classList.remove("active"));
        for (let i = 0; i < rating; i++) {
            document.querySelectorAll("#stars span")[i].classList.add("active");
        }
    });
});

// 📊 display reviews
function displayReviews() {
    let container = document.getElementById("reviews");
    container.innerHTML = "";

    let total = 0;

    reviews.forEach(r => {
        let div = document.createElement("div");
        div.className = "review";
        div.innerHTML = "⭐".repeat(r.rating) + "<br>" + r.comment;
        container.appendChild(div);

        total += r.rating;
    });

    let avg = reviews.length ? (total / reviews.length).toFixed(1) : 0;
    document.getElementById("average").innerText = avg;
}

// ➕ add review
function addReview() {
    let comment = document.getElementById("comment").value;

    if (rating == 0 || comment === "") {
        alert("Remplis tout !");
        return;
    }

    reviews.push({
        rating: parseInt(rating),
        comment: comment
    });

    localStorage.setItem("reviews", JSON.stringify(reviews));

    document.getElementById("comment").value = "";
    rating = 0;
    document.querySelectorAll("#stars span").forEach(s => s.classList.remove("active"));

    displayReviews();
}

// init
window.onload = displayReviews;
</script>

</body>
</html>
