<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<style>
body {
    font-family: Arial;
    background: #111827;
    color: white;
    display: flex;
    justify-content: center;
    padding: 30px;
}

.box {
    background: white;
    color: black;
    width: 500px;
    padding: 20px;
    border-radius: 15px;
}

.card {
    background: #f1f5f9;
    padding: 10px;
    margin-top: 10px;
    border-radius: 10px;
}

.stats {
    display: flex;
    justify-content: space-between;
}

.stat {
    background: #1f2937;
    color: white;
    padding: 10px;
    border-radius: 10px;
    width: 30%;
    text-align: center;
}
</style>
</head>

<body>

<div class="box">

<h2>👨‍💼 Admin Dashboard</h2>

<div class="stats">
    <div class="stat">
        <h3 id="count">0</h3>
        <p>Clients</p>
    </div>

    <div class="stat">
        <h3 id="avg">0</h3>
        <p>Moyenne</p>
    </div>

    <div class="stat">
        <h3 id="fullCount">0</h3>
        <p>Commentaires</p>
    </div>
</div>

<h3>Avis</h3>
<div id="list"></div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("data")) || [];

function load() {
    let list = document.getElementById("list");
    list.innerHTML = "";

    let total = 0;
    let count = data.length;
    let comments = 0;

    data.forEach(d => {
        total += d.rating;

        if (d.comment !== "") comments++;

        let div = document.createElement("div");
        div.className = "card";
        div.innerHTML = "⭐".repeat(d.rating) + "<br>" + (d.comment || "-");

        list.appendChild(div);
    });

    document.getElementById("count").innerText = count;
    document.getElementById("avg").innerText = count ? (total / count).toFixed(1) : 0;
    document.getElementById("fullCount").innerText = comments;
}

window.onload = load;
</script>

</body>
</html>
